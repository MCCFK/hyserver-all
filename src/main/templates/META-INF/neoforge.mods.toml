modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="MC_CaoFangKuai"
description='''
hyserver 作者MC_CaoFangKuai
按服主/玩家要求禁用 添加或修改一些内容
'''

[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="${neo_version}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="sable"
    type="optional"
    versionRange="*"
    ordering="BEFORE"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="create"
    type="optional"
    versionRange="*"
    ordering="AFTER"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="createaddition"
    type="optional"
    versionRange="*"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="create_enchantment_industry"
    type="optional"
    versionRange="*"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="jei"
    type="optional"
    versionRange="*"
    ordering="AFTER"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="chat_heads"
    type="optional"
    versionRange="*"
    ordering="NONE"
    side="CLIENT"
